/**
 * Top-level build file for ftc_app project.
 *
 * It is extraordinarily rare that you will ever need to edit this file.
 */

buildscript {
    ext {
        kotlin_version = '2.2.0'
    }
    repositories {
        mavenCentral()
        google()

        maven {
            url "https://plugins.gradle.org/m2/"
        }
    }
    dependencies {
        // Note for FTC Teams: Do not modify this yourself.
        classpath 'com.android.tools.build:gradle:8.7.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        classpath 'org.mozilla.rust-android-gradle:plugin:0.9.6'
    }
}

// This is now required because aapt2 has to be downloaded from the
// google() repository beginning with version 3.2 of the Android Gradle Plugin
allprojects {
    repositories {
        mavenCentral()
        google()
        maven {
            url = "https://mymaven.bylazar.com/releases"
        }
    }
}

repositories {
    mavenCentral()
}

tasks.register('runTrajopt', Exec) {
    description = 'Starts the trajopt server with TeamCode/trajopt/ as the project directory'
    group = 'setup'

    workingDir "${projectDir}/deps/mecanum_trajopt"
    commandLine 'scripts/host.sh', '--project-dir', "${projectDir}/TeamCode/trajopt"
}

tasks.register('setupDeps', Exec) {
    description = 'Initializes all git submodules recursively and runs trajopt setup script'
    group = 'setup'

    doFirst {
        println "Initializing and updating git submodules..."
    }

    commandLine 'git', 'submodule', 'update', '--init', '--recursive'

    doLast {
        println "Checking out main branch in submodules..."
        exec {
            commandLine 'git', 'submodule', 'foreach', '--recursive',
                'git checkout $(git symbolic-ref refs/remotes/origin/HEAD | sed \'s@^refs/remotes/origin/@@\')'
        }

        println "Pulling Git LFS objects..."
        exec {
            commandLine 'git', 'lfs', 'pull'
        }
        exec {
            commandLine 'git', 'submodule', 'foreach', '--recursive', 'git lfs pull'
        }

        println "Running trajopt setup script..."
        exec {
            workingDir "${projectDir}/deps/mecanum_trajopt"
            commandLine 'bash', 'scripts/setup.sh'
        }
        println "setupDeps complete."
    }
}
